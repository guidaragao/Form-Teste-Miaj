<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIAJ Corretora de Seguros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: #0d1117; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes glow { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.25; } }
@keyframes lineGrow { from { width: 0; } to { width: 60px; } }

.hero {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #0d1117 0%, #1A2332 40%, #2C3E50 70%, #1A2332 100%);
}
.hero-pattern {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.03;
  background-image:
    repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(-45deg, #fff 0, #fff 1px, transparent 1px, transparent 40px);
}
.hero-glow {
  position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(196,30,58,0.18) 0%, transparent 70%);
  pointer-events: none; animation: glow 4s ease-in-out infinite;
}
.hero-content { position: relative; z-index: 2; padding: 40px 24px; max-width: 720px; }

.hero-logo { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 44px; animation: fadeInUp 0.8s ease-out; }
.hero-logo-circle { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #C41E3A; display: flex; align-items: center; justify-content: center; position: relative; }
.hero-logo-circle span { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 36px; color: #fff; letter-spacing: -1px; }
.logo-notch { position: absolute; left: 50%; transform: translateX(-50%); width: 10px; height: 7px; background: #141b24; }
.logo-notch-top { top: -4px; }
.logo-notch-bottom { bottom: -4px; }
.logo-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 32px; color: #fff; letter-spacing: 5px; }
.logo-sub { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 4px; text-transform: uppercase; }

.hero-line { width: 60px; height: 3px; background: #C41E3A; margin: 0 auto 36px; border-radius: 2px; animation: lineGrow 1s ease-out 0.4s both; }

.hero h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 46px; color: #fff; line-height: 1.15; margin-bottom: 22px; animation: fadeInUp 0.8s ease-out 0.2s both; }
.hero h1 em { font-style: normal; color: #C41E3A; }
.hero p.sub { font-size: 17px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 44px; max-width: 520px; margin-left: auto; margin-right: auto; animation: fadeInUp 0.8s ease-out 0.4s both; }

.hero-cta { display: inline-flex; align-items: center; gap: 10px; padding: 18px 48px; border-radius: 50px; border: none; background: #C41E3A; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: all 0.3s; box-shadow: 0 4px 30px rgba(196,30,58,0.4); text-decoration: none; animation: fadeInUp 0.8s ease-out 0.6s both; }
.hero-cta:hover { background: #a8182f; transform: translateY(-3px); box-shadow: 0 8px 40px rgba(196,30,58,0.5); }
.hero-cta-arrow { font-size: 20px; transition: transform 0.3s; }
.hero-cta:hover .hero-cta-arrow { transform: translateX(4px); }

.hero-trust { margin-top: 52px; display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; animation: fadeIn 1s ease-out 1s both; }
.hero-trust-item { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.3); font-size: 13px; }
.hero-trust-icon { font-size: 18px; }

.whatsapp-fab { position: fixed; bottom: 20px; right: 20px; width: 58px; height: 58px; border-radius: 50%; border: none; background: #25d366; color: #fff; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(37,211,102,0.4); display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 1001; text-decoration: none; }
.whatsapp-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(37,211,102,0.5); }

@media (max-width: 640px) {
  .hero h1 { font-size: 30px; }
  .hero p.sub { font-size: 15px; }
  .hero-trust { gap: 20px; }
  .hero-logo-circle { width: 60px; height: 60px; }
  .hero-logo-circle span { font-size: 28px; }
  .logo-name { font-size: 24px; letter-spacing: 3px; }
  .hero-cta { padding: 16px 36px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-pattern"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <div class="hero-logo">
      <div class="hero-logo-circle">
        <span>M</span>
        <div class="logo-notch logo-notch-top"></div>
        <div class="logo-notch logo-notch-bottom"></div>
      </div>
      <div>
        <div class="logo-name">MIAJ</div>
        <div class="logo-sub">Corretora de Seguros</div>
      </div>
    </div>
    <div class="hero-line"></div>
    <h1>Proteja o que <em>importa</em> com quem <em>entende</em></h1>
    <p class="sub">Cotação rápida e personalizada com as melhores seguradoras do mercado. Atendimento humano e sem compromisso.</p>
    <a href="cotacao.html" class="hero-cta">
      Solicitar Cotação <span class="hero-cta-arrow">→</span>
    </a>
    <div class="hero-trust">
      <div class="hero-trust-item"><span class="hero-trust-icon">🛡️</span> +12 seguradoras</div>
      <div class="hero-trust-item"><span class="hero-trust-icon">⚡</span> Resposta em 1 dia útil</div>
      <div class="hero-trust-item"><span class="hero-trust-icon">💬</span> Atendimento humano</div>
    </div>
  </div>
</div>

<a class="whatsapp-fab" href="https://wa.me/5579998163242?text=Olá! Vim pelo site da MIAJ e gostaria de falar com um corretor." target="_blank">💬</a>

</body>
</html>
