.progress-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Montserrat', sans-serif; flex-shrink: 0; transition: all 0.3s; }

.ramo-card-label { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 13px; color: #2C3E50; }

.form-card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #C41E3A; box-shadow: 0 0 0 3px rgba(196,30,58,0.1); }

.form-select.toggle { border-color: #C41E3A; font-weight: 600; }
.form-textarea { resize: vertical; }
.form-error { color: #C41E3A; font-size: 11px; margin-top: 4px; }

.multicheck { display: flex; flex-wrap: wrap; gap: 8px; }
.multicheck-btn { padding: 7px 14px; border-radius: 20px; font-size: 12px; border: 1.5px solid #d1d5db; background: #fff; color: #2C3E50; cursor: pointer; transition: all 0.2s; font-family: 'Open Sans', sans-serif; }
.multicheck-btn.checked { border-color: #C41E3A; background: #C41E3A; color: #fff; }

/* ─── SUCCESS ─── */

/* ─── CHATBOT ─── */
.chat-fab { position: fixed; bottom: 20px; right: 20px; width: 58px; height: 58px; border-radius: 50%; border: none; background: linear-gradient(135deg, #C41E3A, #9B1830); color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(196,30,58,0.35); display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 1001; }

.chat-options { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

.chat-footer { padding: 10px 16px; border-top: 1px solid #eee; background: #fff; font-size: 11px; color: #999; text-align: center; }

/* ─── RESPONSIVE ─── */

  .ramo-grid { grid-template-columns: repeat(3, 1fr); }
  .header h1 { font-size: 22px; }
  .progress-label { display: none; }
  .chatbot { width: calc(100vw - 20px); right: 10px; bottom: 80px; height: calc(100vh - 100px); }
}
</style>

let state = { step: 0, ramo: null, personal: { nome:"", email:"", telefone:"", cpf:"" }, ramoData: {}, errors: {} };

// ═══════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════
function getVisibleFields() {
  return (RAMO_FIELDS[state.ramo] || []).filter(f => {
    if (!f.showWhen) return true;
    return state.ramoData[f.showWhen.field] === f.showWhen.value;
  });
}

function isFullWidth(f) {
  return f.type==="textarea" || f.type==="multicheck" || f.isToggle || ["endereco","razao_social","tipo_seguro","detalhes"].includes(f.name);
}

function renderField(f, data) {
  const val = data[f.name] || "";
  const err = state.errors[f.name];
  let html = `<div class="form-group${isFullWidth(f) ? " full-width" : ""}">`;
  html += `<label class="form-label">${f.label}${f.required ? ' <span class="req">*</span>' : ''}</label>`;

  if (f.type === "select") {
    html += `<select class="form-select${f.isToggle ? " toggle" : ""}${err ? " error" : ""}" onchange="updateField('${f.name}','${data===state.personal?"personal":"ramo"}',this.value)">`;
    html += `<option value="">Selecione...</option>`;
    f.options.forEach(o => html += `<option value="${o}"${val===o?" selected":""}>${o}</option>`);
    html += `</select>`;
  } else if (f.type === "textarea") {
    html += `<textarea class="form-textarea${err ? " error" : ""}" rows="3" placeholder="${f.placeholder||""}" onchange="updateField('${f.name}','${data===state.personal?"personal":"ramo"}',this.value)">${val}</textarea>`;
  } else if (f.type === "multicheck") {
    html += `<div class="multicheck">`;
    const arr = data[f.name] || [];
    f.options.forEach(o => html += `<button class="multicheck-btn${arr.includes(o)?" checked":""}" onclick="toggleMulti('${f.name}','${o}')">${o}</button>`);
    html += `</div>`;
  } else {
    html += `<input class="form-input${err ? " error" : ""}" type="${f.type||"text"}" value="${val}" placeholder="${f.placeholder||""}" onchange="updateField('${f.name}','${data===state.personal?"personal":"ramo"}',this.value)">`;
  }

  if (err) html += `<div class="form-error">${err}</div>`;
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  const ramoInfo = RAMOS.find(r => r.id === state.ramo);

  // Progress
  const steps = ["Ramo","Seus Dados","Detalhes","Enviar"];
  let progHtml = "";
  if (state.step < 4) {
    steps.forEach((s, i) => {
      const act = state.step >= i;
      const cur = state.step === i;
      progHtml += `<div class="progress-step">`;
      progHtml += `<div class="progress-num ${act?"active":"inactive"}">${i+1}</div>`;
      progHtml += `<span class="progress-label ${act?"active":"inactive"}"${cur?" style='font-weight:700'":""}>${s}</span>`;
      if (i < 3) progHtml += `<div class="progress-line ${state.step>i?"active":"inactive"}"></div>`;
      progHtml += `</div>`;
    });
  }
  document.getElementById("progress").innerHTML = progHtml;
  document.getElementById("progress").style.display = state.step >= 4 ? "none" : "flex";

  // Step 0: Ramo selection
  if (state.step === 0) {
    let h = `<div class="section"><h2 class="section-title">Qual tipo de seguro você precisa?</h2><p class="section-subtitle">Selecione o ramo para ver os campos específicos</p><div class="ramo-grid">`;
    RAMOS.forEach(r => { h += `<div class="ramo-card" onclick="selectRamo('${r.id}')"><div class="ramo-card-icon">${r.icon}</div><div class="ramo-card-label">${r.label}</div></div>`; });
    h += `</div></div>`;
    app.innerHTML = h;
  }

  // Step 1: Personal data
  else if (state.step === 1) {
    let h = `<div class="section"><div class="section-title-row"><span class="section-icon">${ramoInfo.icon}</span><h2 class="section-title">Seguro ${ramoInfo.label}</h2></div><p class="section-subtitle">Primeiro, seus dados de contato</p>`;
    h += `<div class="form-card"><div class="form-grid">`;
    h += `<div class="full-width">${renderField({name:"nome",label:"Nome Completo",type:"text",placeholder:"Seu nome completo",required:true}, state.personal)}</div>`;
    h += renderField({name:"email",label:"E-mail",type:"email",placeholder:"seu@email.com",required:true}, state.personal);
    h += renderField({name:"telefone",label:"Telefone / WhatsApp",type:"text",placeholder:"(79) 99999-9999",required:true}, state.personal);
    h += renderField({name:"cpf",label:"CPF",type:"text",placeholder:"000.000.000-00"}, state.personal);
    h += `</div><div class="btn-row"><button class="btn-back" onclick="goStep(0)">Voltar</button><button class="btn-next" onclick="goStep1Next()">Continuar →</button></div></div></div>`;
    app.innerHTML = h;
  }

  // Step 2: Ramo-specific fields
  else if (state.step === 2) {
    const detailLabel = state.ramo==="auto" ? "do Veículo" : state.ramo==="residencial" ? "do Imóvel" : state.ramo==="vida" ? "Pessoais" : `do Seguro ${ramoInfo.label}`;
    let h = `<div class="section"><div class="section-title-row"><span class="section-icon">${ramoInfo.icon}</span><h2 class="section-title">Detalhes ${detailLabel}</h2></div><p class="section-subtitle">Quanto mais informações, melhor a cotação!</p>`;

    // Hints
    if (state.ramo==="auto" && state.ramoData.situacao_veiculo==="Já possuo o veículo") {
      h += `<div class="hint-box hint-yellow"><span class="hint-icon">🚗</span><span>Dica: informe a placa que buscamos automaticamente marca, modelo e ano!</span></div>`;
    }
    if (state.ramo==="auto" && state.ramoData.situacao_veiculo==="Estou pesquisando / ainda vou comprar") {
      h += `<div class="hint-box hint-blue"><span class="hint-icon">💡</span><span>Sem problema! Informe o modelo de interesse e a gente faz uma cotação estimada pra te ajudar na decisão.</span></div>`;
    }
    if (state.ramo==="residencial" && state.ramoData.situacao_imovel==="Estou pesquisando / ainda vou comprar/alugar") {
      h += `<div class="hint-box hint-blue"><span class="hint-icon">💡</span><span>Tudo bem! Informe a região de interesse e o tipo de imóvel que a gente já prepara uma estimativa.</span></div>`;
    }

    h += `<div class="form-card"><div class="form-grid">`;
    getVisibleFields().forEach(f => h += (isFullWidth(f) ? `<div class="full-width">${renderField(f,state.ramoData)}</div>` : renderField(f,state.ramoData)));
    h += `</div><div class="btn-row"><button class="btn-back" onclick="goStep(1)">Voltar</button><button class="btn-next" onclick="submitForm()">Enviar Cotação →</button></div></div></div>`;
    app.innerHTML = h;
  }

  // Step 3+: Success
  else {
    const ri = ramoInfo || { icon:"📌", label:"Seguro" };
    let h = `<div class="success"><div class="success-check">✓</div><h2>Cotação Enviada!</h2><p>Seus dados foram enviados por email para nossa equipe. Entraremos em contato em até 24 horas úteis com as melhores opções para você.</p><p class="sub">${ri.icon} Seguro ${ri.label} para ${state.personal.nome}</p>`;
    h += `<div class="success-btns"><button class="btn-back" onclick="resetForm()">Nova Cotação</button><a class="btn-whatsapp" href="https://wa.me/5579998163242" target="_blank">💬 Falar no WhatsApp</a></div></div>`;
    app.innerHTML = h;
  }
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function selectRamo(id) { state.ramo = id; state.ramoData = {}; state.errors = {}; state.step = 1; render(); }
function goStep(n) { state.errors = {}; state.step = n; render(); }

function updateField(name, target, value) {
  if (target === "personal") state.personal[name] = value;
  else state.ramoData[name] = value;
  delete state.errors[name];
  // Re-render if toggle field changed (to show/hide conditional fields)
  const fields = RAMO_FIELDS[state.ramo] || [];
  const field = fields.find(f => f.name === name);
  if (field && field.isToggle) render();
}

function toggleMulti(name, option) {
  const arr = state.ramoData[name] || [];
  state.ramoData[name] = arr.includes(option) ? arr.filter(x => x !== option) : [...arr, option];
  render();
}

function goStep1Next() {
  state.errors = {};
  if (!state.personal.nome.trim()) state.errors.nome = "Obrigatório";
  if (!state.personal.telefone.trim()) state.errors.telefone = "Obrigatório";
  if (!state.personal.email.trim()) state.errors.email = "Obrigatório";
  if (Object.keys(state.errors).length > 0) { render(); return; }
  state.step = 2;
  render();
}

function submitForm() {
  state.errors = {};
  getVisibleFields().forEach(f => {
    if (f.required && !state.ramoData[f.name]?.toString().trim()) state.errors[f.name] = "Obrigatório";
  });
  if (Object.keys(state.errors).length > 0) { render(); return; }

  // Build email
  const ramoLabel = RAMOS.find(r => r.id === state.ramo)?.label || state.ramo;
  const now = new Date();
  let body = `═══════════════════════════════\n`;
  body += `   NOVA COTAÇÃO - MIAJ CORRETORA DE SEGUROS\n`;
  body += `═══════════════════════════════\n\n`;
  body += `Ramo: ${ramoLabel}\n`;
  body += `Data: ${now.toLocaleDateString("pt-BR")} às ${now.toLocaleTimeString("pt-BR")}\n\n`;
  body += `── DADOS DO CLIENTE ──\n`;
  body += `Nome: ${state.personal.nome}\n`;
  body += `Email: ${state.personal.email}\n`;
  body += `Telefone: ${state.personal.telefone}\n`;
  if (state.personal.cpf) body += `CPF: ${state.personal.cpf}\n`;
  body += `\n── DETALHES (${ramoLabel}) ──\n`;

  getVisibleFields().forEach(f => {
    const val = state.ramoData[f.name];
    if (val && val.toString().trim()) {
      body += `${f.label}: ${Array.isArray(val) ? val.join(", ") : val}\n`;
    }
  });

  body += `\n═══════════════════════════════\nEnviado pelo formulário MIAJ Corretora de Seguros`;
  const subject = `Nova Cotação ${ramoLabel} - ${state.personal.nome}`;

  // Enviar via EmailJS
  if (EMAILJS_SERVICE_ID !== "COLE_SEU_SERVICE_ID_AQUI") {
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      subject: subject,
      message: body,
      name: state.personal.nome,
      from_email: state.personal.email,
      from_phone: state.personal.telefone,
    }, EMAILJS_PUBLIC_KEY)
    .then(function() {
      console.log("Email enviado com sucesso!");
    })
    .catch(function(err) {
      console.error("Erro ao enviar:", err);
      alert("Houve um erro ao enviar. Tente novamente ou entre em contato pelo WhatsApp.");
    });
  } else {
    // Fallback mailto caso EmailJS não esteja configurado
    window.open(`mailto:${RECIPIENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, "_blank");
  }

  state.step = 4;
  render();
}

function resetForm() {
  state = { step: 0, ramo: null, personal: { nome:"", email:"", telefone:"", cpf:"" }, ramoData: {}, errors: {} };
  render();
}

let chatOpen = false;
let chatMessages = [{ from:"bot", key:"greeting" }];

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById("chatbot").classList.toggle("open", chatOpen);
  document.getElementById("chatFab").classList.toggle("open", chatOpen);
  document.getElementById("chatFab").textContent = chatOpen ? "✕" : "💬";
  document.getElementById("chatBubble").style.display = chatOpen ? "none" : "block";
  if (chatOpen) renderChat();
}

function renderChat() {
  const el = document.getElementById("chatMessages");
  let h = "";
  chatMessages.forEach(msg => {
    if (msg.from === "bot") {
      const faq = FAQ_DATA[msg.key];
      h += `<div class="chat-msg-bot"><div class="chat-msg-avatar">M</div><div><div class="chat-msg-text">${faq.text}</div>`;
      if (faq.options) {
        h += `<div class="chat-options">`;
        faq.options.forEach(o => {
          if (o.action === "whatsapp") {
            h += `<button class="chat-option" style="background:#25d366;color:#fff;border-color:#25d366;" onclick="chatAction('${o.action}','${o.label.replace(/'/g,"\\'")}')">${o.label}</button>`;
          } else {
            h += `<button class="chat-option" onclick="chatAction('${o.action}','${o.label.replace(/'/g,"\\'")}')">${o.label}</button>`;
          }
        });
        h += `</div>`;
      }
      h += `</div></div>`;
    } else {
      h += `<div class="chat-msg-user"><div class="chat-msg-user-text">${msg.text}</div></div>`;
    }
  });
  el.innerHTML = h;
  el.scrollTop = el.scrollHeight;
}

function chatAction(action, label) {
  if (action === "whatsapp") {
    window.open("https://wa.me/5579998163242?text=Olá! Vim pelo site da MIAJ e gostaria de falar com um corretor.", "_blank");
    return;
  }
  chatMessages.push({ from:"user", text: label });
  chatMessages.push({ from:"bot", key: action });
  renderChat();
}
